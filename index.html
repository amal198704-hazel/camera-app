<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>PMAY · ultra modern</title>
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: linear-gradient(145deg, #e8edf2 0%, #f0f4fa 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 0 24px 0;
        }

        /* main card container – ultra modern glass panel */
        .phone-frame {
            max-width: 420px;
            width: 100%;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 42px 42px 32px 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25), inset 0 1px 2px rgba(255, 255, 255, 0.6);
            margin: 16px 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* page views */
        #listPage,
        #detailPage {
            transition: opacity 0.2s ease;
        }

        /* ----- header / search (elevated) ----- */
        .header {
            padding: 24px 20px 20px 20px;
            background: transparent;
            position: sticky;
            top: 0;
            z-index: 10;
            transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
        }

        .header.scrolled {
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 20px -8px rgba(0, 20, 40, 0.1);
        }

        .search-wrapper {
            position: relative;
            width: 100%;
        }

        .search-wrapper i {
            position: absolute;
            left: 18px;
            top: 16px;
            color: #5b687c;
            font-size: 1rem;
            opacity: 0.7;
            pointer-events: none;
        }

        .search {
            width: 100%;
            padding: 16px 18px 16px 48px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1.5px solid rgba(255, 255, 255, 0.9);
            border-radius: 36px;
            box-shadow: 0 8px 18px -6px rgba(0, 20, 40, 0.12), inset 0 0 0 1px rgba(255, 255, 255, 0.8);
            font-weight: 450;
            color: #1e2b3c;
            outline: none;
            transition: all 0.2s ease;
        }

        .search::placeholder {
            color: #6f7c8f;
            font-weight: 400;
            letter-spacing: -0.2px;
        }

        .search:focus {
            background: white;
            border-color: #ffffff;
            box-shadow: 0 12px 24px -12px rgba(0, 100, 220, 0.3), 0 0 0 3px rgba(120, 160, 255, 0.2);
        }

        /* ----- cards container (airy) ----- */
        .cards {
            padding: 4px 16px 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* micro‑modern card with big radius & inner glow */
        .card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 28px;
            padding: 18px 20px;
            box-shadow: 0 10px 20px -8px rgba(0, 20, 40, 0.12), 0 0 0 1px rgba(255, 255, 255, 0.6) inset;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }

        .card:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.85);
            box-shadow: 0 24px 34px -16px rgba(28, 52, 84, 0.25), 0 0 0 1.5px rgba(255, 255, 255, 0.9) inset;
        }

        .card:active {
            transform: scale(0.99);
        }

        .card-left h4 {
            font-size: 1.1rem;
            font-weight: 620;
            letter-spacing: -0.3px;
            background: linear-gradient(145deg, #1f2e48, #1d3b5c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
        }

        .card-left p {
            font-size: 0.9rem;
            color: #2b3f59;
            font-weight: 460;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .card-left p i {
            color: #7f8b9f;
            font-size: 0.8rem;
            width: 18px;
        }

        .card-right {
            text-align: right;
        }

        .badge-cat {
            background: rgba(170, 200, 240, 0.3);
            backdrop-filter: blur(4px);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #1d446b;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: inset 0 1px 3px white;
        }

        .amount {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #13293d;
            margin-top: 8px;
            background: linear-gradient(135deg, #193047, #23456b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .amount.with-value::before {
            content: '₹';
            font-size: 1rem;
            font-weight: 500;
            margin-right: 2px;
            opacity: 0.8;
        }

        .amount.empty-value {
            font-size: 1rem;
            opacity: 0.4;
            font-weight: 400;
            background: none;
            -webkit-text-fill-color: #6f7c8f;
            color: #6f7c8f;
        }

        /* --- detail page ultra modern --- */
        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 22px 20px 12px 20px;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: 50px;
            padding: 10px 22px 10px 18px;
            font-size: 1rem;
            font-weight: 500;
            color: #1d3b5c;
            box-shadow: 0 4px 12px -6px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.15s;
        }

        .back-btn i {
            font-size: 0.9rem;
        }

        .back-btn:hover {
            background: white;
        }

        .action-group {
            display: flex;
            gap: 14px;
        }

        .icon-btn {
            border: none;
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(8px);
            width: 44px;
            height: 44px;
            border-radius: 30px;
            font-size: 1.2rem;
            color: #1b3a5e;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 5px 12px -8px #1e3f5e;
            cursor: pointer;
            transition: 0.15s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            background: white;
            transform: scale(1.05);
            color: #0a2a44;
        }

        /* detail fields – glass cards */
        #detailContent {
            padding: 8px 20px 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .field {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: 22px;
            padding: 16px 20px;
            font-size: 1rem;
            color: #1d3853;
            box-shadow: inset 0 2px 4px white, 0 6px 14px -12px #1e3a5a;
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 8px;
        }

        .field b {
            font-weight: 640;
            min-width: 100px;
            color: #162b40;
        }

        .field span {
            color: #23456b;
            font-weight: 500;
        }

        .field .empty-field {
            opacity: 0.4;
            font-style: italic;
            font-weight: 400;
        }

        /* modal — ultra clean */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(30, 40, 60, 0.3);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 200;
            padding: 16px;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 40px;
            width: 100%;
            max-width: 400px;
            padding: 28px 22px;
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 30px 50px -30px #0a1e30, 0 0 0 1px rgba(255, 255, 255, 0.6) inset;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .modal-content input {
            background: rgba(255, 255, 255, 0.7);
            border: 1.5px solid rgba(255, 255, 255, 0.9);
            border-radius: 30px;
            padding: 16px 20px;
            font-size: 1rem;
            color: #122b41;
            outline: none;
            transition: all 0.2s;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.02);
        }

        .modal-content input:focus {
            border-color: white;
            background: white;
            box-shadow: 0 0 0 3px rgba(140, 180, 255, 0.2);
        }

        .modal-content input[readonly] {
            background: rgba(230, 240, 250, 0.5);
            color: #1e3855;
            font-weight: 500;
        }

        button.save {
            background: linear-gradient(145deg, #1d3855, #112b42);
            border: none;
            border-radius: 40px;
            padding: 18px 24px;
            font-weight: 600;
            font-size: 1.1rem;
            color: white;
            letter-spacing: 0.3px;
            box-shadow: 0 10px 24px -10px #0f2e4a, 0 0 0 1px rgba(255, 255, 255, 0.4) inset;
            cursor: pointer;
            transition: 0.15s;
            margin-top: 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        button.save:hover {
            background: linear-gradient(145deg, #22466b, #15344f);
            transform: scale(1.01);
        }

        /* loading state */
        .loading {
            text-align: center;
            padding: 40px 20px;
            color: #3a4d67;
            font-size: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .loading i {
            font-size: 2rem;
            opacity: 0.5;
            animation: spin 2s infinite linear;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .placeholder-tip {
            color: #3a4d67;
            text-align: center;
            padding: 40px 20px;
            font-size: 1.1rem;
            opacity: 0.7;
        }

        /* hide pages */
        #detailPage {
            display: none;
        }
    </style>
</head>

<body>
    <div class="phone-frame" id="appFrame">
        <!-- list page -->
        <div id="listPage">
            <div class="header" id="mainHeader">
                <div class="search-wrapper">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" class="search" placeholder="Search PMAY ID / Name" onkeyup="searchCards()">
                </div>
            </div>
            <div class="cards" id="cards">
                <div class="loading">
                    <i class="fa-solid fa-circle-notch"></i>
                    <span>Loading data...</span>
                </div>
            </div>
        </div>

        <!-- detail page -->
        <div class="detail" id="detailPage">
            <div class="detail-header">
                <button class="back-btn" onclick="backToList()"><i class="fa-solid fa-chevron-left"></i> Back</button>
                <div class="action-group">
                    <button class="icon-btn" onclick="openEdit()"><i class="fa-solid fa-pen"></i></button>
                    <button class="icon-btn" onclick="deleteData()"><i class="fa-solid fa-trash"></i></button>
                </div>
            </div>
            <div id="detailContent"></div>
        </div>

        <!-- edit modal -->
        <div class="modal" id="editModal">
            <div class="modal-content">
                <input id="pmayid" placeholder="PMAY ID" readonly>
                <input id="name" placeholder="Full name">
                <input id="category" placeholder="Category">
                <input id="sanction" placeholder="Sanction">
                <input id="cs" placeholder="CS" type="number">
                <input id="bp" placeholder="BP share" type="number">
                <input id="gp" placeholder="GP share" type="number">
                <input id="dp" placeholder="DP share" type="number">
                <input id="gtotal" placeholder="G Total" type="number">
                <button class="save" onclick="updateData()">Save update</button>
            </div>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbzrpA4K4LSFDDaaWK5VLi3uQooMStmKKsZM0JYTTo1ry_OqPLPtoVlSr4wT0W0e_HzS/exec";
        let allData = [];
        let currentRow = null;

        // Format number with commas
        function formatNumber(num) {
            if (num === undefined || num === null || num === '') return '';
            const n = Number(num);
            if (isNaN(n)) return num;
            return n.toLocaleString('en-IN');
        }

        // Escape HTML for safety
        function escapeHtml(unsafe) {
            if (unsafe === undefined || unsafe === null) return '';
            return String(unsafe).replace(/[&<>"]/g, function (m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                if (m === '"') return '&quot;';
                return m;
            });
        }

        // Fetch data
        function readData() {
            fetch(API)
                .then(res => res.json())
                .then(data => {
                    console.log('Data loaded:', data);
                    allData = data;
                    renderCards(data);
                })
                .catch(error => {
                    console.error('Error loading data:', error);
                    document.getElementById('cards').innerHTML = `
                    <div class="placeholder-tip">
                        <i class="fa-solid fa-cloud"></i><br>
                        Unable to load data<br>
                        <small style="opacity:0.6">${error.message}</small>
                    </div>
                `;
                });
        }

        // Render cards with your JSON structure
        function renderCards(dataArray) {
            const container = document.getElementById('cards');
            if (!dataArray || dataArray.length === 0) {
                container.innerHTML = `<div class="placeholder-tip">✨ No matching records</div>`;
                return;
            }

            let html = '';
            dataArray.forEach(each => {
                // Handle empty gtotal
                const gtotal = each.gtotal !== undefined && each.gtotal !== '' ? each.gtotal : null;
                const hasGtotal = gtotal !== null && !isNaN(Number(gtotal)) && Number(gtotal) > 0;

                html += `
                <div class="card" onclick='openDetail(${JSON.stringify(each).replace(/'/g, "&apos;")})'>
                    <div class="card-left">
                        <h4>${escapeHtml(each.pmayid) || '—'}</h4>
                        <p><i class="fa-regular fa-user"></i> ${escapeHtml(each.name) || '—'}</p>
                        <p style="margin-top:2px"><i class="fa-regular fa-tag"></i> ${escapeHtml(each.category) || '—'}</p>
                    </div>
                    <div class="card-right">
                        <span class="badge-cat">PMAY</span>
                        <div class="amount ${hasGtotal ? 'with-value' : 'empty-value'}">
                            ${hasGtotal ? formatNumber(gtotal) : 'No amount'}
                        </div>
                    </div>
                </div>
            `;
            });
            container.innerHTML = html;
        }

        // Search functionality
        window.searchCards = function () {
            const val = document.querySelector('.search')?.value.toLowerCase() || '';
            const filtered = allData.filter(x =>
                (x.pmayid && x.pmayid.toLowerCase().includes(val)) ||
                (x.name && x.name.toLowerCase().includes(val))
            );
            renderCards(filtered);
        };

        // Open detail view
        window.openDetail = function (row) {
            currentRow = row;
            document.getElementById('listPage').style.display = 'none';
            document.getElementById('detailPage').style.display = 'block';

            const detailDiv = document.getElementById('detailContent');

            // Helper to display field with empty state
            const displayField = (label, value) => {
                const hasValue = value !== undefined && value !== null && value !== '';
                return `
                <div class="field">
                    <b>${label}</b>
                    <span class="${!hasValue ? 'empty-field' : ''}">
                        ${hasValue ? escapeHtml(value) : '— not set —'}
                    </span>
                </div>
            `;
            };

            detailDiv.innerHTML = `
            ${displayField('PMAY ID', row.pmayid)}
            ${displayField('Name', row.name)}
            ${displayField('Category', row.category)}
            ${displayField('Sanction', row.sanction)}
            ${displayField('CS', row.cs !== '' ? formatNumber(row.cs) : '')}
            ${displayField('BP SHARE', row.bp !== '' ? formatNumber(row.bp) : '')}
            ${displayField('GP SHARE', row.gp !== '' ? formatNumber(row.gp) : '')}
            ${displayField('DP SHARE', row.dp !== '' ? formatNumber(row.dp) : '')}
            ${displayField('G TOTAL', row.gtotal !== '' ? formatNumber(row.gtotal) : '')}
        `;
        };

        window.backToList = function () {
            document.getElementById('detailPage').style.display = 'none';
            document.getElementById('listPage').style.display = 'block';
        };

        // Open edit modal
        window.openEdit = function () {
            if (!currentRow) return;
            document.getElementById('editModal').style.display = 'flex';
            document.getElementById('pmayid').value = currentRow.pmayid || '';
            document.getElementById('name').value = currentRow.name || '';
            document.getElementById('category').value = currentRow.category || '';
            document.getElementById('sanction').value = currentRow.sanction || '';
            document.getElementById('cs').value = currentRow.cs || '';
            document.getElementById('bp').value = currentRow.bp || '';
            document.getElementById('gp').value = currentRow.gp || '';
            document.getElementById('dp').value = currentRow.dp || '';
            document.getElementById('gtotal').value = currentRow.gtotal || '';
        };

        // Update data
        window.updateData = function () {
            const payload = {
                action: 'update',
                id: document.getElementById('pmayid').value,
                name: document.getElementById('name').value,
                category: document.getElementById('category').value,
                sanction: document.getElementById('sanction').value,
                cs: document.getElementById('cs').value,
                bp: document.getElementById('bp').value,
                gp: document.getElementById('gp').value,
                dp: document.getElementById('dp').value,
                gtotal: document.getElementById('gtotal').value
            };

            fetch(API, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            }).then(() => {
                alert('✓ Updated successfully');
                document.getElementById('editModal').style.display = 'none';

                // Update local data
                if (currentRow) {
                    Object.assign(currentRow, payload);
                    // Remove action and id from currentRow if needed
                    delete currentRow.action;
                    // Refresh views
                    openDetail(currentRow);
                }

                // Refresh list
                readData();
            }).catch(() => alert('Update failed'));
        };

        // Delete data
        window.deleteData = function () {
            if (!currentRow || !currentRow.pmayid) return;

            if (confirm('Are you sure you want to delete this record?')) {
                fetch(API + `?del=true&id=${encodeURIComponent(currentRow.pmayid)}`)
                    .then(res => res.text())
                    .then(msg => {
                        alert(msg);
                        backToList();
                        readData();
                    })
                    .catch(() => alert('Delete error'));
            }
        };

        // Close modal when clicking outside
        document.getElementById('editModal').addEventListener('click', function (e) {
            if (e.target === this) this.style.display = 'none';
        });

        // Header shrink on scroll
        window.addEventListener('scroll', function () {
            const header = document.querySelector('.header');
            if (!header) return;
            if (window.scrollY > 20) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });

        // Initialize
        window.onload = function () {
            document.getElementById('listPage').style.display = 'block';
            document.getElementById('detailPage').style.display = 'none';
            readData();
        };
    </script>
</body>

</html>
